server:
  port: ${PORT:8080}

spring:
  application:
    # Also used as OTLP resource service.name → New Relic entity / filter for metrics
    name: ${APP_NAME:roman-numerals-service}

springdoc:
  swagger-ui:
    persistAuthorization: true

logging:
  level:
    root: INFO
    com.example.romanapi: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  metrics:
    # JVM heap/GC/threads, process CPU/memory/uptime, system load (exported to OTLP when enabled)
    enable:
      jvm: true
      process: true
      system: true
    tags:
      application: ${spring.application.name}
  # Custom + JVM/process meters → New Relic OTLP when NEW_RELIC_METRICS_EXPORT=true.
  # With Docker + NR Java agent, set NEW_RELIC_METRICS_EXPORT=false to avoid duplicate JVM metrics.
  otlp:
    metrics:
      export:
        enabled: ${NEW_RELIC_METRICS_EXPORT:false}
        url: ${NEW_RELIC_OTLP_METRICS_URL:https://otlp.nr-data.net/v1/metrics}
        step: ${NEW_RELIC_METRICS_STEP:60s}
        headers:
          api-key: ${NEW_RELIC_LICENSE_KEY:}
        resource-attributes:
          service.name: ${APP_NAME:roman-numerals-service}

app:
  api-key:
    header: ${API_KEY_HEADER:x-api-key}
    value: ${APP_API_KEY:}
  range-executor:
    threads: ${RANGE_EXECUTOR_THREADS:0}

